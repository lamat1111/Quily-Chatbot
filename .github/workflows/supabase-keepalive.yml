name: Supabase Keepalive

on:
  schedule:
    # Keep one daily ping to prevent Supabase from pausing
    - cron: '7 9 * * *'    # 09:07 UTC
    # - cron: '33 10 * * *'  # 10:33 UTC  (+1h26m)
    # - cron: '4 12 * * *'   # 12:04 UTC  (+1h31m)
    # - cron: '51 12 * * *'  # 12:51 UTC  (+47m)
    # - cron: '18 15 * * *'  # 15:18 UTC  (+2h27m)
    # - cron: '42 16 * * *'  # 16:42 UTC  (+1h24m)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          API="${SUPABASE_URL}/rest/v1"
          AUTH=(-H "apikey: ${SUPABASE_SERVICE_KEY}" -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Pool of operations — shuffled and sampled each run
          op_chunk_count()  { curl -sf "${API}/document_chunks_chutes?select=id&limit=1" "${AUTH[@]}" -H "Prefer: count=exact" -o /dev/null && echo "op — RAG chunk count"; }
          op_latest()       { curl -sf "${API}/document_chunks_chutes?select=id,source_file,created_at&order=created_at.desc&limit=$((RANDOM % 5 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — latest chunks"; }
          op_doc_types()    { curl -sf "${API}/document_chunks_chutes?select=doc_type&limit=$((RANDOM % 10 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — doc types"; }
          op_sources()      { curl -sf "${API}/document_chunks_chutes?select=source_file&limit=$((RANDOM % 8 + 1))&order=source_file" "${AUTH[@]}" -o /dev/null && echo "op — source files"; }
          op_oldest()       { curl -sf "${API}/document_chunks_chutes?select=id,title&order=created_at.asc&limit=$((RANDOM % 3 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — oldest chunks"; }
          op_by_heading()   { curl -sf "${API}/document_chunks_chutes?select=id,heading_path&limit=$((RANDOM % 5 + 1))&order=id.desc" "${AUTH[@]}" -o /dev/null && echo "op — heading paths"; }
          op_token_stats()  { curl -sf "${API}/document_chunks_chutes?select=token_count&order=token_count.desc&limit=$((RANDOM % 3 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — token stats"; }
          op_random_offset(){ curl -sf "${API}/document_chunks_chutes?select=id,title&limit=1&offset=$((RANDOM % 50))" "${AUTH[@]}" -o /dev/null && echo "op — random offset read"; }
          op_published()    { curl -sf "${API}/document_chunks_chutes?select=id,published_date&order=published_date.desc.nullslast&limit=$((RANDOM % 4 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — published dates"; }
          op_write_ping1()  { curl -sf "${API}/keepalive_pings" "${AUTH[@]}" -H "Content-Type: application/json" -H "Prefer: resolution=merge-duplicates" -d "{\"id\": 1, \"pinged_at\": \"${NOW}\", \"source\": \"github-actions\"}" -o /dev/null && echo "op — write ping 1"; }
          op_write_ping2()  { curl -sf "${API}/keepalive_pings" "${AUTH[@]}" -H "Content-Type: application/json" -H "Prefer: resolution=merge-duplicates" -d "{\"id\": 2, \"pinged_at\": \"${NOW}\", \"source\": \"streak\"}" -o /dev/null && echo "op — write ping 2"; }
          op_read_ping1()   { curl -sf "${API}/keepalive_pings?id=eq.1&select=pinged_at,source" "${AUTH[@]}" -o /dev/null && echo "op — read ping 1"; }
          op_read_ping2()   { curl -sf "${API}/keepalive_pings?id=eq.2&select=pinged_at,source" "${AUTH[@]}" -o /dev/null && echo "op — read ping 2"; }
          op_read_all_pings(){ curl -sf "${API}/keepalive_pings?select=*&order=id" "${AUTH[@]}" -o /dev/null && echo "op — read all pings"; }

          # Always run writes first
          op_write_ping1
          op_write_ping2

          # Shuffle reads and pick 8–12
          OPS=(op_chunk_count op_latest op_doc_types op_sources op_oldest op_by_heading op_token_stats op_random_offset op_published op_read_ping1 op_read_ping2 op_read_all_pings)
          SHUFFLED=($(shuf -e "${OPS[@]}"))
          RUN_COUNT=$((RANDOM % 5 + 8))

          COUNT=2
          for op in "${SHUFFLED[@]}"; do
            [ $COUNT -ge $((RUN_COUNT + 2)) ] && break
            sleep $((RANDOM % 4))
            $op
            COUNT=$((COUNT + 1))
          done

          echo "Keepalive complete: ${COUNT} operations at ${NOW}"
