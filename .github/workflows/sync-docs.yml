name: Daily Docs Sync & RAG Ingestion

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync-and-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Sync Discord announcements
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
        run: |
          if [ -n "$DISCORD_BOT_TOKEN" ] && [ -n "$DISCORD_CHANNEL_IDS" ]; then
            yarn sync-discord sync
          else
            echo "Discord secrets not configured, skipping"
          fi

      - name: Generate general channel recap
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GENERAL_CHANNEL_ID: ${{ secrets.DISCORD_GENERAL_CHANNEL_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -n "$DISCORD_BOT_TOKEN" ] && [ -n "$DISCORD_GENERAL_CHANNEL_ID" ] && [ -n "$OPENROUTER_API_KEY" ]; then
            yarn recap-general
          else
            echo "Recap secrets not configured, skipping"
          fi

      - name: Check for documentation changes
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for upstream doc changes
          OUTPUT=$(yarn sync-docs status 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "unchanged"; then
            DOCS_CHANGED="false"
          else
            DOCS_CHANGED="true"
          fi

          # Check for Discord file changes (written by previous step)
          if [ -n "$(git status --porcelain docs/discord/ 2>/dev/null)" ]; then
            DISCORD_CHANGED="true"
          else
            DISCORD_CHANGED="false"
          fi

          if [ "$DOCS_CHANGED" = "true" ] || [ "$DISCORD_CHANGED" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

          echo "Docs changed: $DOCS_CHANGED, Discord changed: $DISCORD_CHANGED"

      - name: Sync upstream docs
        if: steps.check.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn sync-docs sync

      - name: Run RAG ingestion
        if: steps.check.outputs.has_changes == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHUTES_API_KEY: ${{ secrets.CHUTES_API_KEY }}
        run: yarn ingest run

      - name: Commit synced docs and manifest
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/quilibrium-official/
          git add docs/discord/ || true
          git diff --staged --quiet || git commit -m "docs: sync documentation and announcements (automated daily)"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_changes }}" == "true" ]; then
            echo "✅ Documentation synced and RAG updated"
          else
            echo "✅ No changes detected — documentation is up to date"
          fi
