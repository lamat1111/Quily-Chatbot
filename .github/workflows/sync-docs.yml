name: Daily Docs Sync & RAG Ingestion

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync-and-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check for documentation changes
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(yarn sync-docs status 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "unchanged"; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync docs and run ingestion
        if: steps.check.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHUTES_API_KEY: ${{ secrets.CHUTES_API_KEY }}
        run: yarn sync-docs sync --ingest

      - name: Commit synced docs and manifest
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add docs/quilibrium-official/
          git diff --staged --quiet || git commit -m "docs: sync Quilibrium documentation (automated daily)"
          git push

      - name: Supabase keepalive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Random delay 0–45 minutes so activity doesn't always hit at the same time
          DELAY=$((RANDOM % 2700))
          echo "Waiting ${DELAY}s before keepalive (~$((DELAY / 60))m)..."
          sleep $DELAY

          API="${SUPABASE_URL}/rest/v1"
          AUTH=(-H "apikey: ${SUPABASE_SERVICE_KEY}" -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Pool of operations — we'll shuffle and run 10+ each day
          # Each function does one DB operation
          op_chunk_count()  { curl -sf "${API}/document_chunks_chutes?select=id&limit=1" "${AUTH[@]}" -H "Prefer: count=exact" -o /dev/null && echo "op — RAG chunk count"; }
          op_latest()       { curl -sf "${API}/document_chunks_chutes?select=id,source_file,created_at&order=created_at.desc&limit=$((RANDOM % 5 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — latest chunks (random limit)"; }
          op_doc_types()    { curl -sf "${API}/document_chunks_chutes?select=doc_type&limit=$((RANDOM % 10 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — doc types sample"; }
          op_sources()      { curl -sf "${API}/document_chunks_chutes?select=source_file&limit=$((RANDOM % 8 + 1))&order=source_file" "${AUTH[@]}" -o /dev/null && echo "op — source files sample"; }
          op_oldest()       { curl -sf "${API}/document_chunks_chutes?select=id,title&order=created_at.asc&limit=$((RANDOM % 3 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — oldest chunks"; }
          op_by_heading()   { curl -sf "${API}/document_chunks_chutes?select=id,heading_path&limit=$((RANDOM % 5 + 1))&order=id.desc" "${AUTH[@]}" -o /dev/null && echo "op — heading paths"; }
          op_token_stats()  { curl -sf "${API}/document_chunks_chutes?select=token_count&order=token_count.desc&limit=$((RANDOM % 3 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — token count stats"; }
          op_random_offset(){ curl -sf "${API}/document_chunks_chutes?select=id,title&limit=1&offset=$((RANDOM % 50))" "${AUTH[@]}" -o /dev/null && echo "op — random offset read"; }
          op_write_ping1()  { curl -sf "${API}/keepalive_pings" "${AUTH[@]}" -H "Content-Type: application/json" -H "Prefer: resolution=merge-duplicates" -d "{\"id\": 1, \"pinged_at\": \"${NOW}\", \"source\": \"github-actions\"}" -o /dev/null && echo "op — write ping row 1"; }
          op_write_ping2()  { curl -sf "${API}/keepalive_pings" "${AUTH[@]}" -H "Content-Type: application/json" -H "Prefer: resolution=merge-duplicates" -d "{\"id\": 2, \"pinged_at\": \"${NOW}\", \"source\": \"streak\"}" -o /dev/null && echo "op — write ping row 2"; }
          op_read_ping1()   { curl -sf "${API}/keepalive_pings?id=eq.1&select=pinged_at,source" "${AUTH[@]}" -o /dev/null && echo "op — read ping row 1"; }
          op_read_ping2()   { curl -sf "${API}/keepalive_pings?id=eq.2&select=pinged_at,source" "${AUTH[@]}" -o /dev/null && echo "op — read ping row 2"; }
          op_read_all_pings(){ curl -sf "${API}/keepalive_pings?select=*&order=id" "${AUTH[@]}" -o /dev/null && echo "op — read all pings"; }
          op_published()    { curl -sf "${API}/document_chunks_chutes?select=id,published_date&order=published_date.desc.nullslast&limit=$((RANDOM % 4 + 1))" "${AUTH[@]}" -o /dev/null && echo "op — published dates"; }

          # Always run writes first to ensure the table has data
          op_write_ping1
          op_write_ping2

          # Shuffle remaining ops and pick 8–12 to run
          OPS=(op_chunk_count op_latest op_doc_types op_sources op_oldest op_by_heading op_token_stats op_random_offset op_read_ping1 op_read_ping2 op_read_all_pings op_published)
          SHUFFLED=($(shuf -e "${OPS[@]}"))
          RUN_COUNT=$((RANDOM % 5 + 8))

          COUNT=2  # already ran 2 writes
          for op in "${SHUFFLED[@]}"; do
            [ $COUNT -ge $((RUN_COUNT + 2)) ] && break
            # Random micro-delay between ops (0–3s)
            sleep $((RANDOM % 4))
            $op
            COUNT=$((COUNT + 1))
          done

          echo "Keepalive complete: ${COUNT} operations at ${NOW}"

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_changes }}" == "true" ]; then
            echo "✅ Documentation synced and RAG updated"
          else
            echo "✅ No changes detected — documentation is up to date"
          fi
