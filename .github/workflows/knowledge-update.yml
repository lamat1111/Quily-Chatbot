name: Knowledge Update Pipeline

on:
  issues:
    types: [labeled]

jobs:
  generate-docs-pr:
    if: github.event.label.name == 'knowledge-update'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Check for existing PR
        id: check-existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "knowledge/issue-${{ github.event.issue.number }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            gh issue comment "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --body "A PR for this issue already exists: #${EXISTING_PR}"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check-existing.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate docs and create PR
        if: steps.check-existing.outputs.skip != 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          branch_prefix: "knowledge/"
          branch_name_template: "issue-{{entityNumber}}"
          allowed_non_write_users: "*"
          prompt: |
            You are a documentation assistant for the Quily Chatbot knowledge base.
            A community member has submitted a knowledge update request via GitHub issue #${{ github.event.issue.number }}.

            ## Your Task

            Read the issue and create or update a markdown documentation file based on the information provided.

            ## Rules

            1. **PROTECTED FOLDERS — NEVER modify files in these directories:**
               - `docs/quilibrium-official/` (automated mirror of docs.quilibrium.com)
               - `docs/discord/` (automated Discord announcement scrapes)
               - `docs/transcriptions/` (curated livestream transcripts)
               - If the issue asks to change content in these folders, do NOT make any file changes. Instead, post a comment on the issue explaining:
                 "These docs are automated mirrors or curated content and can't be edited through this process. For official docs changes, submit to https://github.com/QuilibriumNetwork/docs. Discord announcements and transcriptions are managed separately."

            2. **ALLOWED FOLDERS — You may only create/edit files in:**
               - `docs/community/` (community-contributed content)
               - `docs/custom/` (detailed technical references)

            3. **FILE PLACEMENT:**
               - If the issue references an existing file in `docs/community/` or `docs/custom/`, edit that file
               - If it's new information with no existing doc, create a new file in `docs/community/`
               - Use kebab-case for filenames (e.g., `Hypersnap-Validator-Update.md`)

            4. **FRONTMATTER FORMAT — Every doc must start with:**
               ```yaml
               ---
               title: <Document Title>
               source: Community Contribution (Issue #${{ github.event.issue.number }})
               date: <YYYY-MM-DD of today>
               type: <technical_reference|guide|comparison|faq>
               topics: [<relevant, topic, tags>]
               ---
               ```
               If editing an existing file, update the `date` field and keep the existing `source` unless it was also a community contribution.

            5. **CONTENT GUIDELINES:**
               - Write factual, clear markdown
               - Include any sources or links provided in the issue
               - Keep the tone neutral and informative
               - Do not invent information beyond what the issue provides

            6. **DO NOT modify any files outside the `docs/` directory.** No source code, no workflows, no configs.

            7. **PR DESCRIPTION — When creating the PR, use:**
               - Title: `docs: <short summary>` (under 70 chars)
               - Body must start with: `Closes #${{ github.event.issue.number }}`
               - Include 1-2 bullet points describing what was added/changed
               - End with: `> If this update supersedes existing docs, consider running /update-news after merging to annotate outdated references across the knowledge base.`

            ## Issue Content

            Title: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

      - name: Validate changes are in allowed directories
        if: steps.check-existing.outputs.skip != 'true' && steps.claude.outputs.branch_name
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED_FILES" ]; then
            echo "No files changed, nothing to validate"
            exit 0
          fi

          INVALID_FILES=""
          while IFS= read -r file; do
            if [[ "$file" != docs/community/* ]] && [[ "$file" != docs/custom/* ]]; then
              INVALID_FILES="$INVALID_FILES\n  - $file"
            fi
          done <<< "$CHANGED_FILES"

          if [ -n "$INVALID_FILES" ]; then
            echo "::error::Claude modified files outside allowed directories:$INVALID_FILES"
            gh issue comment "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --body "The automated pipeline attempted to modify files outside the allowed directories. A maintainer will handle this manually."
            gh issue label add "needs-manual-review" \
              --repo "${{ github.repository }}" \
              "${{ github.event.issue.number }}" || true
            exit 1
          fi

          echo "All changed files are in allowed directories"

      - name: Handle failure
        if: failure() && steps.check-existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "Failed to process this knowledge update automatically. A maintainer will handle it manually." || true
          gh issue label add "needs-manual-review" \
            --repo "${{ github.repository }}" \
            "${{ github.event.issue.number }}" || true
