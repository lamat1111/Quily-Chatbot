name: Weekly Tech Tree Sync

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync-techtree:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Sync tech tree
        run: yarn sync-techtree

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain docs/custom/auto/Quilibrium-Tech-Tree.md)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Run RAG ingestion
        if: steps.check.outputs.has_changes == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHUTES_API_KEY: ${{ secrets.CHUTES_API_KEY }}
        run: yarn ingest run

      - name: Commit updated tech tree
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/custom/auto/Quilibrium-Tech-Tree.md
          git commit -m "docs: sync tech tree roadmap (automated weekly)"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_changes }}" == "true" ]; then
            echo "Tech tree updated and RAG re-ingested"
          else
            echo "No changes detected — tech tree is up to date"
          fi
